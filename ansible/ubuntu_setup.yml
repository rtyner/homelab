---

- hosts: servers
  become: true
  roles:
  - role: artis3n.tailscale
    vars:
      tailscale_authkey: "{{ lookup('env', 'TAILSCALE_KEY') }}"
  tasks:

  - name: nopasswd sudo
    lineinfile:
        path: /etc/sudoers
        state: present
        backup: yes
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL) NOPASSWD: ALL'
        validate: 'visudo -cf %s'
        
  - name: disable root login
    lineinfile:
        path: /etc/ssh/sshd_config
        state: present
        backup: yes        
        regexp: '^PermitRootLogin'
        line: "PermitRootLogin no"

  - name: restart ssh
    service:
      name: ssh
      state: restarted

  - name: bashrc
    get_url: 
      url: https://raw.githubusercontent.com/rtyner/dotfiles/master/.bashrc
      dest: /home/rt/

  - name: standard packages
    apt:
      pkg: 
      - vim
      - git
      - gpg
      - htop
      - curl
      - unzip
      - rsync
      - rclone
      - dnsutils
      - nfs-common
      - python3-pip
      - build-essential
      - python3-setuptools
      update_cache: yes
      force_apt_get: True
      name: "*"
      state: latest
      autoremove: yes