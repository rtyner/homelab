---
- name: Deploy PowerDNS Servers
  hosts: dns_servers
  become: true
  vars:
    pdns_db_password: "{{ vault_pdns_db_password }}"
    primary_dns: "10.1.1.96"
    secondary_dns: "10.1.1.97"
    mysql_root_password: "{{ vault_mysql_root_password }}"
    
  tasks:
    - name: Install required packages
      apt:
        name:
          - pdns-server
          - pdns-backend-mysql
          - mysql-server
          - python3-mysqldb
        state: present
        update_cache: yes

    - name: Create PowerDNS database
      mysql_db:
        name: powerdns
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create PowerDNS user
      mysql_user:
        name: pdns
        password: "{{ pdns_db_password }}"
        priv: 'powerdns.*:ALL'
        host: localhost
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create PowerDNS schema file
      copy:
        dest: /tmp/pdns.sql
        content: |
          CREATE TABLE domains (
            id                    INT AUTO_INCREMENT,
            name                  VARCHAR(255) NOT NULL,
            master                VARCHAR(128) DEFAULT NULL,
            last_check           INT DEFAULT NULL,
            type                  VARCHAR(6) NOT NULL,
            notified_serial      INT UNSIGNED DEFAULT NULL,
            account              VARCHAR(40) CHARACTER SET 'utf8' DEFAULT NULL,
            PRIMARY KEY (id),
            UNIQUE KEY name_index (name)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE records (
            id                    BIGINT AUTO_INCREMENT,
            domain_id            INT DEFAULT NULL,
            name                  VARCHAR(255) DEFAULT NULL,
            type                  VARCHAR(10) DEFAULT NULL,
            content              TEXT DEFAULT NULL,
            ttl                   INT DEFAULT NULL,
            prio                  INT DEFAULT NULL,
            disabled             TINYINT(1) DEFAULT 0,
            ordername            VARCHAR(255) BINARY DEFAULT NULL,
            auth                  TINYINT(1) DEFAULT 1,
            PRIMARY KEY (id),
            KEY nametype_index (name,type),
            KEY domain_id (domain_id),
            KEY ordername (ordername)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE supermasters (
            ip                    VARCHAR(64) NOT NULL,
            nameserver            VARCHAR(255) NOT NULL,
            account              VARCHAR(40) CHARACTER SET 'utf8' NOT NULL,
            PRIMARY KEY (ip, nameserver)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE comments (
            id                    INT AUTO_INCREMENT,
            domain_id            INT NOT NULL,
            name                  VARCHAR(255) NOT NULL,
            type                  VARCHAR(10) NOT NULL,
            modified_at          INT NOT NULL,
            account              VARCHAR(40) CHARACTER SET 'utf8' DEFAULT NULL,
            comment              TEXT CHARACTER SET 'utf8' NOT NULL,
            PRIMARY KEY (id),
            KEY comments_domain_id_idx (domain_id),
            KEY comments_name_type_idx (name,type),
            KEY comments_order_idx (domain_id, modified_at)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE tsigkeys (
            id                    INT AUTO_INCREMENT,
            name                  VARCHAR(255),
            algorithm            VARCHAR(50),
            secret               VARCHAR(255),
            PRIMARY KEY (id),
            UNIQUE KEY namealgoindex (name, algorithm)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE domainmetadata (
            id                    INT AUTO_INCREMENT,
            domain_id            INT NOT NULL,
            kind                  VARCHAR(32),
            content              TEXT,
            PRIMARY KEY (id),
            KEY domainmetadata_idx (domain_id, kind)
          ) Engine=InnoDB CHARACTER SET 'latin1';

          CREATE TABLE cryptokeys (
            id                    INT AUTO_INCREMENT,
            domain_id            INT NOT NULL,
            flags                INT NOT NULL,
            active               BOOL,
            published            BOOL DEFAULT 1,
            content              TEXT,
            PRIMARY KEY(id),
            KEY domainidindex (domain_id)
          ) Engine=InnoDB CHARACTER SET 'latin1';
#
    #- name: Import PowerDNS schema
    #  mysql_db:
    #    name: powerdns
    #    state: import
    #    target: /tmp/pdns.sql
    #    login_unix_socket: /var/run/mysqld/mysqld.sock
#
    #- name: Remove schema file
    #  file:
    #    path: /tmp/pdns.sql
    #    state: absent
#
    - name: Configure PowerDNS
      template:
        src: pdns.conf.j2
        dest: /etc/powerdns/pdns.conf
        owner: pdns
        group: pdns
        mode: '0640'
      notify: restart pdns

    - name: Enable PowerDNS service
      systemd:
        name: pdns
        enabled: yes
        state: started

    - name: Configure MySQL replication
      when: inventory_hostname == primary_dns
      block:
        - name: Create replication user
          mysql_user:
            name: repl
            password: "{{ mysql_replication_password }}"
            priv: '*.*:REPLICATION SLAVE'
            host: "{{ secondary_dns }}"
            state: present
            login_unix_socket: /var/run/mysqld/mysqld.sock

        - name: Configure primary MySQL server
          template:
            src: primary.cnf.j2
            dest: /etc/mysql/mysql.conf.d/replication.cnf
          notify: restart mysql

    - name: Configure secondary MySQL server
      when: inventory_hostname == secondary_dns
      template:
        src: secondary.cnf.j2
        dest: /etc/mysql/mysql.conf.d/replication.cnf
      notify: restart mysql

  handlers:
    - name: restart pdns
      systemd:
        name: pdns
        state: restarted

    - name: restart mysql
      systemd:
        name: mysql
        state: restarted