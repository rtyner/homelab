              bel=^G, blink=\E[5m, bold=\E[1m, cbt=\E[Z, civis=\E[?25l,
              clear=\E[H\E[2J, cnorm=\E[?12l\E[?25h, cr=^M,
              csr=\E[%i%p1%d;%p2%dr, cub=\E[%p1%dD, cub1=^H,
