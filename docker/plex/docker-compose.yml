---
version: "2.1"
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - PLEX_CLAIM=claim-9td7qzDa4KEY5Hmn3q3-
    volumes:
      - /media/red/Media/library:/config
      - /media/red/Media/TV:/tv
      - /media/red/Media/Movies:/movies
    restart: unless-stopped